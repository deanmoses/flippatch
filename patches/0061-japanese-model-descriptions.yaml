attribution: flipcommons-ai-desc-model
description: >
  Narrative descriptions for early-Japanese models.
claims:
  # --- Nihon Tenbo ---
  - model.home-run-nihon-tenbo:
      expect: { year: 1967 }
      cite: https://earlyarcadesjapan.blogspot.com/2023/01/home-run-by-japan-outlook-entertainment.html
      description: |
        Home Run (ホームランゲーム) is a baseball-themed [[technology-generation:electromechanical]] flipper game by [[manufacturer:nihon-tenbo]], dating to around 1967. Its playfield layout closely resembles Sankyo's later [[model:the-world-series]].
  - model.soccer-ace:
      expect: { year: 1969 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Soccer Ace (サッカーエース) is a 1969 soccer-themed flipper game by [[manufacturer:nihon-tenbo]].
  - model.beat-spark:
      expect: { year: 1970 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Beat & Spark (ビート＆スパーク) is a 1970 soccer-themed ("Socker") flipper game by [[manufacturer:nihon-tenbo]], built with the Tokyo Corporation.
  - model.jumbokick:
      expect: { year: 1970 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Jumbo Kick (ジャンボキック) is a 1970 flipper game by [[manufacturer:nihon-tenbo]], built with the Tokyo Corporation.
  # --- Kato ---
  - model.soccer-8:
      expect: { year: 1967 }
      cite: https://earlyarcadesjapan.blogspot.com/2024/02/blog-post.html
      description: |
        Soccer 8 (サッカー8) is a soccer-themed [[technology-generation:electromechanical]] game by [[manufacturer:kato]], dating to around 1967.
  # --- Showa Yuen ---
  - model.rocket-v:
      expect: { year: 1970 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Rocket V (ロケットV) is a 1970 space-themed flipper game by [[manufacturer:showa-yuen]].
  # --- Children's Amusement Park Facilities ---
  - model.space-patrol-childrens:
      expect: { year: 1968 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Space Patrol (宇宙パトロール) is a space-themed [[technology-generation:electromechanical]] game by [[manufacturer:childrens-amusement-park-facilities]], dating to around 1968.
  # --- Banpresto ---
  - model.muden-kun:
      expect: { year: 1999 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Muden Kun (むでんくん) is a 1999 prize-dispenser flipper game by [[manufacturer:banpresto]].
  - model.kinnikuman-ii-power-mucho:
      expect: { year: 2002 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Kinnikuman II Power Mucho (キン肉マン2世 パワームーチョ) is a 2002 prize-dispenser flipper game by [[manufacturer:banpresto]], based on the licensed Kinnikuman ("Muscle Man") franchise.
  # --- Tomato Land ---
  - model.target-machine-base-ball:
      expect: { year: 2007 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Target Machine Base Ball (ターゲットマシン ベースボール) is a 2007 candy-vending, baseball-themed flipper game by [[manufacturer:tomato-land]].
  - model.target-machine-type-1:
      expect: { year: 2007 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Target Machine Type 1 (ターゲットマシン タイプ１, "Tropical Q") is a candy-vending flipper game by [[manufacturer:tomato-land]], dating to around 2007.
  - model.target-machine-pirates:
      expect: { year: 2010 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Target Machine Pirates (ターゲットマシン パイレーツ) is a pirate-themed candy-vending flipper game by [[manufacturer:tomato-land]], dating to around 2010.
  # --- Towa ---
  - model.slap-shot-towa:
      expect: { year: 1996 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Slap Shot (スラップショット) is a hockey-themed flipper game by [[manufacturer:towa]], made in 1996, with a 1997 version.
  # --- Sunwise ---
  - model.american-battle-dome:
      expect: { year: 1995 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        American Battle Dome (アメリカンバトルゲーム) is a 1995 head-to-head flipper game by [[manufacturer:sunwise]], adapting Tsukuda Original's [[franchise:battle-dome]] toy.
  # --- Sankyo (primary entity) ---
  - model.apollo-moon:
      expect: { year: 1972 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Apollo Moon (アポロムーン) is a 1972 space-themed flipper game by [[manufacturer:sankyo-seiki]] (Sankyo).
  - model.the-world-series:
      expect: { year: 1972 }
      cite: https://earlyarcadesjapan.blogspot.com/2022/06/the-world-series-by-sankyo.html
      description: |
        The World Series (ワールドシリーズ) is a baseball-themed flipper game by [[manufacturer:sankyo-seiki]] (Sankyo) dating to 1972; its playfield uses balls to run a baseball diamond. A 1976 re-release was sold as [[model:new-world-series]].
  - model.big-race-sankyo:
      expect: { year: 1969 }
      cite: https://earlyarcadesjapan.blogspot.com/2024/06/big-race-by-sankyo.html
      description: |
        Big Race (ビックレース) is a car-racing [[technology-generation:electromechanical]] flipper game by [[manufacturer:sankyo-seiki]] (Sankyo). It appeared in the 1969 machine directory and may be older.
  - model.japan-series:
      expect: { year: 1969 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Japan Series (日本シリーズ) is a baseball-themed flipper game by [[manufacturer:sankyo-seiki]] (Sankyo), dating to around 1969.
  - model.advantage:
      expect: { year: 1976 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Advantage (アドバンテージ) is a 1976 tennis-themed flipper game by [[manufacturer:sankyo-seiki]] (Sankyo).
  - model.american-football:
      expect: { year: 1976 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        American Football (アメリカンフットボール) is a 1976 American-football-themed flipper game by [[manufacturer:sankyo-seiki]] (Sankyo).
  - model.new-world-series:
      expect: { year: 1976 }
      cite: https://earlyarcadesjapan.blogspot.com/2022/06/the-world-series-by-sankyo.html
      description: |
        New World Series (ニューワールドシリーズ) is the 1976 re-release of Sankyo's [[model:the-world-series]], by [[manufacturer:sankyo-seiki]]; Sankyo's advertisements called it New World Series.
  # --- Sankyo (amusement-park entity) ---
  - model.new-big-race:
      expect: { year: 1972 }
      cite: https://earlyarcadesjapan.blogspot.com/2025/09/new-big-race-by-sankyo.html
      description: |
        New Big Race (ニュービッグレース) is a car-racing flipper game by [[manufacturer:sankyo-yuen-setsubi-kabushikigaisha]] (Sankyo), dated to 1972 from its listing in the 1973 machine directory printed in late 1972.
