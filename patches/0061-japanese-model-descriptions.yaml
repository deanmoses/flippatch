      description: |
        Crazy 15 [Mark II] (クレイジー15ゲーム) is a 1965 variant of [[manufacturer:komaya-seisakusho]]'s [[model:crazy-15-15]] flipper game.
  - model.crazy-15-mark-iii:
      expect: { year: 1969 }
      cite: https://earlyarcadesjapan.blogspot.com/2022/04/1970-15-2nd-version-crazy-15-by-komaya.html
      description: |
        Crazy 15 [Mark III] (クレイジー15ゲーム) is a 1969 variant of [[manufacturer:komaya-seisakusho]]'s [[model:crazy-15-15]] flipper game.
  - model.saturn-komaya:
      expect: { year: 1969 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Saturn (サターン号) is a space-themed flipper game by [[manufacturer:komaya-seisakusho]], dating to around 1969.
  - model.ware-sea-rover:
      expect: { year: 1969 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Ware Sea Rover (海賊ゲーム, "pirate game") is a pirate-themed flipper game by [[manufacturer:komaya-seisakusho]], dating to around 1969.
  - model.ronin:
      expect: { year: 1970 }
      cite: https://earlyarcadesjapan.blogspot.com/2023/05/1970-ronin.html
      description: |
        Ronin (浪人) is a 1970 samurai-themed flipper game by [[manufacturer:komaya-seisakusho]].
  - model.pocket-ball:
      expect: { year: 1974 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Pocket Ball (ポケットボール) is a 1974 flipper game by [[manufacturer:komaya-seisakusho]].
  - model.indy-game:
      expect: { year: 1967 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Indy Game (インディゲーム) is a car-racing [[technology-generation:electromechanical]] flipper game by [[manufacturer:komaya-seisakusho]], dating to around 1967.
  - model.lets-go-moon:
      expect: { year: 1968 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
