  # --- Universal (Japan) ---
  - model.orienteering:
      expect: { year: 1976 }
      cite: "https://thetastates.com/eremeka/eremekaDisplay.php?mentionOnly=1&search=yes&tag=yokomono+~+flipper+pinball"
      description: |
        Orienteering (オリエンテーリング) is a 1976 two-player flipper game by [[manufacturer:universal]].
  - model.asteroid-killer:
      expect: { year: 1979 }
      cite: https://earlyarcadesjapan.blogspot.com/2026/05/1979-asteroid-killer-by-universal.html
      description: |
        Asteroid Killer is a 1979 flipper game with a video-game element by [[manufacturer:universal]].
  # --- Nihon Gorakuki ---
  - model.ultra-attack:
      expect: { year: 1972 }
      cite: https://earlyarcadesjapan.blogspot.com/2024/03/1972-ultra-attack-by-nihon-gorakuki.html
      description: |
        Ultra Attack (ウルトラアタック) is an [[franchise:ultraman]]-based kaiju flipper game by [[manufacturer:nihon-goraku-ki-kabushikigaisha]] (Nihon Gorakuki), dating to around 1972 and co-credited with [[manufacturer:nihon-tenbo]].
  - model.ultra-spark:
      expect: { year: 1972 }
      cite: https://earlyarcadesjapan.blogspot.com/2024/03/1972-ultra-attack-by-nihon-gorakuki.html
      description: |
        Ultra Spark (ウルトラスパーク) is an [[franchise:ultraman]]-based kaiju flipper game by [[manufacturer:nihon-goraku-ki-kabushikigaisha]] (Nihon Gorakuki), the companion to [[model:ultra-attack]], dating to around 1972 and co-credited with [[manufacturer:nihon-tenbo]].
