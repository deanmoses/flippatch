attribution: flipcommons-catalog
description: >
  operating_status for corporate entities with a non-variant model released since 2010 that
  are not on Wikipedia's current-manufacturers list. ongoing = a 2023-or-newer source shows
  current production; ended = defunct, a one-off, or not a pinball OEM, each cited. Plus model
  fixes: Pinball Tronic game_format (video-screen 'virtual pinball' -> miscellaneous), Road
  Trip production_status, and two aftermarket conversions. Deferred to the ended baseline
  (ambiguous): megaverse-project, mocean, headsup-pinball, quetzal-pinball, team-pinball,
  riot-pinball-llc, eric-priepke, pinnovating, wee-chin-electric-machinery-inc.
sources:
  - name: Arcade Heroes
    source_type: web
    description: >
      Arcade and amusement industry news site covering coin-op releases and trade shows.
    links:
      - { url: 'https://arcadeheroes.com/', label: Arcade Heroes, link_type: homepage }
  - name: This Week in Pinball
    source_type: web
    description: >
      Weekly pinball news archive now hosted by Kineticist.
    links:
      - { url: 'https://twip.kineticist.com/', label: This Week in Pinball, link_type: homepage }
  - name: Ramp's Pinball
    source_type: web
    description: >
      Manufacturer site of Ramp's Pinball, whose debut machine is Road Trip.
    links:
      - { url: 'https://www.rampspinball.com/', label: Ramp's Pinball, link_type: homepage }
  - name: Vector Pinball
    source_type: web
    description: >
      Manufacturer site of Vector Pinball, an Australian pinball maker.
    links:
      - { url: 'https://vectorpinball.com/', label: Vector Pinball, link_type: homepage }
  - name: VPForums
    source_type: web
    description: >
      Long-running virtual-pinball community forum.
    links:
      - { url: 'https://www.vpforums.org/', label: VPForums, link_type: homepage }
  - name: Bingo Pinballs
    source_type: web
    description: >
      Reference site documenting bingo-style coin-op amusement machines and their makers.
    links:
      - { url: 'https://bingo.cdyn.com/', label: Bingo Pinballs, link_type: homepage }
  - name: Recreativas.org
    source_type: web
    description: >
      Spanish-language database of arcade and amusement machines.
    links:
      - { url: 'https://www.recreativas.org/', label: Recreativas.org, link_type: homepage }
