      expect: { ipdb_id: 4539 }
      note: "IPDB says \"This is a re-themed game. It used to be Williams' 1963 'Big Deal'.\", identifying this as an aftermarket re-theme of an existing machine."
      cite: ipdb:4539
      production_status: aftermarket
      tag: [unofficial-retheme]
