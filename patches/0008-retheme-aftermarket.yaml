attribution: flipcommons-catalog
description: >
  Mark aftermarket re-themes (an existing machine re-skinned by a non-manufacturer)
  with production_status `aftermarket` and the `unofficial-retheme` tag. Also tags the
  one official manufacturer re-theme. Supersedes the `one-off` status set on four of
  these rows in patch 0005.
