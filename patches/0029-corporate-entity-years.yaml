attribution: flipcommons-catalog
description: >
  Populate corporate-entity active years for twelve more significant makers, extending 0013:
  Playmatic, Rock-Ola Mfg., Zaccaria, Mills Novelty, O.D. Jennings, Jersey Jack, Spooky, Game
  Plan, Allied Leisure, Atari, Chicago Gaming and H.C. Evans. Years from Wikipedia (cited per
  entry); year_end left unset for makers still in business.
claims:
  - corporate-entity.allied-leisure-industries-incorporated:
      expect: { ipdb_manufacturer_id: 18 }
      note: 'Wikipedia''s article on Centuri (formerly Allied Leisure) lists "Pinball and electro-mechanical games released as Allied Leisure (1968-1979)," and states they renamed it Centuri in 1980.'
      cite: https://en.wikipedia.org/wiki/Centuri
      year_start: 1968
      year_end: 1980
  - corporate-entity.atari-incorporated:
      expect: { ipdb_manufacturer_id: 33 }
      note: 'Wikipedia says "The original Atari, Inc., founded in Sunnyvale, California, United States in 1972 by Nolan Bushnell and Ted Dabney, was a pioneer in arcade games, home video game consoles, and home computers," and that "In 1984, as a result of the video game crash of 1983, the assets of the home console and computer divisions of the original Atari Inc. were sold off [...], while the remaining part of Atari, Inc. was renamed Atari Games Inc."'
      cite: https://en.wikipedia.org/wiki/Atari
      year_start: 1972
      year_end: 1984
  - corporate-entity.chicago-gaming-company:
      expect: { ipdb_manufacturer_id: 432 }
      note: 'Wikipedia says "This part of the company was established as Chicago Gaming Company as a division of Churchill cabinet company in 2001 by Doug Duba, the son of Roger Duba." 2001 is when the Chicago Gaming Company entity was established, not the parent Churchill Cabinet Company (1904). No end year is asserted: still in business.'
      cite: https://en.wikipedia.org/wiki/Chicago_Gaming
      year_start: 2001
  - corporate-entity.game-plan-incorporated:
      expect: { ipdb_manufacturer_id: 126 }
      note: 'Wikipedia says "Game Plan was founded in May of 1977 [...]," and that it "produced pinball machines, arcade video games, and slot machines from 1978 to 1985."'
      cite: https://en.wikipedia.org/wiki/Game_Plan_(company)
      year_start: 1977
      year_end: 1985
  - corporate-entity.h-c-evans-company:
      expect: { ipdb_manufacturer_id: 144 }
      note: 'Wikipedia says "It was established in 1892 and collapsed in 1955."'
      cite: https://en.wikipedia.org/wiki/H._C._Evans
      year_start: 1892
      year_end: 1955
  - corporate-entity.jersey-jack-pinball-inc-lakewood-nj:
      expect: { ipdb_manufacturer_id: 634 }
      note: 'Wikipedia says "Jersey Jack Pinball was founded in January 2011 by industry veteran Jack Guarnieri." No end year is asserted: the company remains in business.'
      cite: https://en.wikipedia.org/wiki/Jersey_Jack_Pinball
      year_start: 2011
  - corporate-entity.mills-novelty-company:
      expect: { ipdb_manufacturer_id: 218 }
      note: 'Wikipedia says "In 1898, Mortimer Mills sold a controlling interest in the company to his son, Herbert S. Mills, and the name of the company was changed from M.B.M. Cigar Vending Company to Mills Novelty Company, Incorporated," and that "The company changed its corporate name from the Mills Novelty Company to Mills Industries, Incorporated on September 1, 1943 [...]."'
      cite: https://en.wikipedia.org/wiki/Mills_Novelty_Company
      year_start: 1898
      year_end: 1943
  - corporate-entity.o-d-jennings-and-company:
      expect: { ipdb_manufacturer_id: 237 }
      note: 'Wikipedia says the company "manufactured other coin-operated machines, including pinball machines, from 1906 to the 1980s," was "founded by Ode D. Jennings as Industry Novelty Company, Incorporated of Chicago," and that "On March 19, 1954, Jennings & Company was incorporated in Illinois and purchased the assets of O. D. Jennings & Company from his estate."'
      cite: https://en.wikipedia.org/wiki/Jennings_%26_Company
      year_start: 1906
      year_end: 1954
  - corporate-entity.playmatic:
      expect: { ipdb_manufacturer_id: 255 }
      note: 'Wikipedia says "Playmatic was a Spanish manufacturer of pinball machines, producing approximately 63 different models between 1968 and 1987."'
      cite: https://en.wikipedia.org/wiki/Playmatic
      year_start: 1968
      year_end: 1987
  - corporate-entity.rock-ola-manufacturing-corporation:
      expect: { ipdb_manufacturer_id: 269 }
      note: 'Wikipedia says "The Rock-Ola Scale Company was founded in 1927 by David Cullen Rockola [...]," and that "The name was changed to Rock-Ola Manufacturing Corporation in 1932." No end year is asserted: Rock-Ola Manufacturing Corporation remains in business.'
      cite: https://en.wikipedia.org/wiki/Rock-Ola
      year_start: 1932
  - corporate-entity.spooky-pinball-llc:
      expect: { ipdb_manufacturer_id: 671 }
      note: 'Wikipedia''s History section says "Charlie Emery officially founded Spooky Pinball in 2013 in Benton, Wisconsin [...]"; the article lead instead says 2016, but the detailed History account (2013) is used here. No end year is asserted: the company remains in business.'
      cite: https://en.wikipedia.org/wiki/Spooky_Pinball
      year_start: 2013
  - corporate-entity.zaccaria:
      expect: { ipdb_manufacturer_id: 356 }
      note: 'Wikipedia says "Zaccaria [...] was an Italian manufacturer of pinball and arcade machines that operated in Bologna from 1974 until 1990."'
      cite: https://en.wikipedia.org/wiki/Zaccaria_(company)
      year_start: 1974
      year_end: 1990
